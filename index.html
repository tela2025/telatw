<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELA 後台管理系統 (雲端同步版)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* 保留 TELA 原本的所有樣式設計 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#F5F3EF;--surface:#FFF;--surface-alt:#FAF9F7;--ink:#1A1A1A;--ink-light:#6B6B6B;--ink-muted:#A0A0A0;--brand:#1B4D6E;--brand-light:#E8F0F6;--accent:#D4A853;--accent-light:#FBF5E8;--danger:#C0392B;--danger-light:#FDECEB;--success:#27AE60;--success-light:#E8F8EF;--border:#E5E2DC;--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--radius:10px;--radius-lg:16px}
        body{font-family:'Noto Sans TC','DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
        
        /* 登入畫面樣式 */
        #login-screen{position:fixed;inset:0;background:var(--brand);z-index:999;display:flex;align-items:center;justify-content:center;color:#fff}
        #login-screen.hidden{display:none}
        .login-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-lg);padding:48px 40px;width:380px;text-align:center;backdrop-filter:blur(10px)}
        .login-box h1{font-family:'DM Sans',sans-serif;font-size:36px;letter-spacing:6px;margin-bottom:4px}
        .login-box .sub{font-size:11px;opacity:.5;letter-spacing:2px;margin-bottom:32px}
        .login-box input{display:block;width:100%;padding:12px 16px;margin-bottom:12px;border:1.5px solid rgba(255,255,255,.25);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-family:inherit}
        .login-box button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
        
        /* 側邊欄與主要佈局 */
        .layout{display:flex;min-height:100vh}
        .sidebar{width:240px;background:var(--brand);color:#fff;padding:24px 0;position:fixed;inset:0 auto 0 0;z-index:100}
        .sidebar-logo{padding:0 24px 28px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:24px;letter-spacing:4px;border-bottom:1px solid rgba(255,255,255,.15)}
        .main{margin-left:240px;flex:1;padding:32px}
        .nav-item{padding:12px 24px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:12px;transition:all .2s;border-left:3px solid transparent}
        .nav-item.active{background:rgba(255,255,255,.12);border-left-color:var(--accent)}
        
        /* 表格與卡片 */
        .card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;margin-bottom:20px}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{background:var(--surface-alt);padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
        td{padding:12px 16px;border-bottom:1px solid var(--border)}
        .badge{padding:4px 10px;border-radius:20px;font-size:12px}
        .badge-paid{background:var(--success-light);color:var(--success)}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>TELA</h1>
        <div class="sub">BACKEND SYSTEM</div>
        <input type="text" id="login-user" placeholder="使用者名稱">
        <input type="password" id="login-pass" placeholder="密碼">
        <button onclick="doLogin()">登入</button>
        <div id="login-error" style="color:#ff6b6b; margin-top:10px;"></div>
    </div>
</div>

<div class="layout" id="app" style="display:none">
    <aside class="sidebar">
        <div class="sidebar-logo">TELA<small style="display:block; font-size:10px; opacity:0.6;">from fabric to story</small></div>
        <div class="nav-item active">訂單管理</div>
        </aside>
    <main class="main">
        <div class="card">
            <h2>訂單管理</h2>
            <table id="order-table">
                <thead>
                    <tr><th>編號</th><th>客戶</th><th>金額</th><th>狀態</th><th>日期</th></tr>
                </thead>
                <tbody id="order-list">
                    </tbody>
            </table>
        </div>
    </main>
</div>

<script>
// 2. 這是你的專屬 Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyDcGIfwA3FosyGt-cWT7t51xho32o4KUnk",
  authDomain: "tela-4eda7.firebaseapp.com",
  databaseURL: "https://tela-4eda7-default-rdb.firebaseio.com", 
  projectId: "tela-4eda7",
  storageBucket: "tela-4eda7.firebasestorage.app",
  messagingSenderId: "1006009215659",
  appId: "1:1006009215659:web:bc14a9adf4f66d165e25ee"
};

firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

// 模擬登入 (這部分你可以之後再根據需要修改)
function doLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    if(user === 'admin' && pass === 'tela2026') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').style.display = 'flex';
        initRealtimeSync();
    } else {
        document.getElementById('login-error').innerText = '帳號或密碼錯誤';
    }
}

// 3. 核心同步邏輯：從 Firebase 讀取資料
function initRealtimeSync() {
    rdb.ref('orders').on('value', (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('order-list');
        list.innerHTML = ''; // 清空舊畫面
        
        if (data) {
            Object.keys(data).forEach(key => {
                const order = data[key];
                list.innerHTML += `
                    <tr>
                        <td>${order.id}</td>
                        <td>${order.customer}</td>
                        <td>$${order.amount}</td>
                        <td><span class="badge badge-paid">${order.status}</span></td>
                        <td>${order.date}</td>
                    </tr>`;
            });
        }
    });
}
</script>
</body>
</html>
